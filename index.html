<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness Study · 健身知识库</title>
    <link rel="stylesheet" href="styles.css?v=training-lab-5" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="sidebar-header">
          <div class="logo">Fitness<span>Study</span></div>
          <div class="subline">NSCA / NASM 双证知识库</div>
        </header>

        <div class="sidebar-body">
          <div class="tabs" role="tablist" aria-label="内容类型">
            <button class="tab active" id="theoryTab" type="button">理论</button>
            <button class="tab" id="exerciseTab" type="button">健身动作</button>
            <button class="tab" id="nutritionTab" type="button">营养学</button>
          </div>

          <label class="search-box">
            <span class="search-icon">⌕</span>
            <input id="searchInput" type="search" placeholder="搜索课程、要点、证书..." autocomplete="off" />
            <button id="clearSearch" class="clear-search" type="button" aria-label="清空搜索">×</button>
          </label>

          <section class="filter-section">
            <h2>证书</h2>
            <div class="chip-group" id="certFilters"></div>
          </section>

          <section class="filter-section">
            <h2>阶段</h2>
            <div class="select-wrap">
              <select id="phaseFilter" aria-label="按学习阶段筛选"></select>
            </div>
          </section>

          <section class="filter-section">
            <h2>分类</h2>
            <div class="chip-group" id="categoryFilters"></div>
          </section>
        </div>
      </aside>

      <main class="main-content">
        <header class="main-header">
          <div>
            <div class="kicker" id="headerKicker">112 Day Library</div>
            <h1 id="headerTitle">健身知识库</h1>
            <p id="headerDescription">按理论、证书、阶段和主题检索；已有详情页可直接弹窗阅读。</p>
          </div>
          <div class="quick-links">
            <a id="headerAction" href="#reviewGrid">复习</a>
          </div>
        </header>

        <section class="result-bar" id="resultBar">
          <div id="resultText">载入中...</div>
          <button id="resetFilters" type="button">重置筛选</button>
        </section>

        <section class="card-grid" id="cardGrid" aria-label="课程卡片"></section>

        <section class="review-grid" id="reviewGrid" aria-label="复习卡片" hidden></section>

        <section class="exercise-panel" id="exercisePanel" hidden>
          <div class="exercise-tabs" role="tablist" aria-label="健身动作子模块">
            <button class="exercise-tab active" type="button" data-exercise-view="library" role="tab">动作库</button>
            <button class="exercise-tab" type="button" data-exercise-view="atlas" role="tab">肌肉图谱</button>
          </div>

          <section class="muscle-atlas" id="muscleAtlas">
            <div class="atlas-toolbar">
              <div>
                <div class="kicker">Muscle Atlas</div>
                <h2>全身肌肉图谱</h2>
              </div>
              <div class="view-switch" role="group" aria-label="肌肉视图">
                <button class="active" type="button" data-atlas-view="front">正面</button>
                <button type="button" data-atlas-view="back">背面</button>
              </div>
            </div>

            <div class="atlas-layout">
              <div class="atlas-figure" id="atlasFigure">
                <img id="atlasImage" src="html/assets/muscle-atlas-front.png" alt="全身肌肉图谱" />
                <div class="hotspot-layer" id="hotspotLayer"></div>
              </div>

              <aside class="muscle-detail" id="muscleDetail" aria-live="polite"></aside>
            </div>
          </section>

          <section class="exercise-library" id="exerciseLibrary" hidden aria-label="动作库">
            <header class="library-header">
              <div>
                <div class="kicker">Movement Library</div>
                <h2>动作库</h2>
                <p>选择动作，查看轨迹、关键提示与常见错误。</p>
              </div>
              <div class="library-count" id="exerciseCount">0 个动作</div>
            </header>

            <div class="library-filters" role="group" aria-label="动作库筛选">
              <label class="library-search">
                <span aria-hidden="true">⌕</span>
                <input id="exerciseSearch" type="search" placeholder="搜索动作、肌群或器械" autocomplete="off" />
              </label>
              <div class="library-filter-group">
                <span class="library-filter-label">动作</span>
                <div class="library-chip-row" id="exercisePatternFilters" aria-label="按动作模式筛选"></div>
              </div>
              <div class="library-filter-group">
                <span class="library-filter-label">肌肉</span>
                <div class="library-chip-row" id="exerciseMuscleFilters" aria-label="按肌肉筛选"></div>
              </div>
              <div class="library-filter-group">
                <span class="library-filter-label">器械</span>
                <div class="library-chip-row" id="exerciseEquipmentFilters" aria-label="按器械筛选"></div>
              </div>
            </div>

            <div class="library-layout">
              <section class="exercise-catalog" aria-label="动作列表">
                <div class="catalog-label">动作列表</div>
                <div class="exercise-cards" id="exerciseCards"></div>
              </section>

              <article class="exercise-detail" id="exerciseDetail" aria-live="polite"></article>
            </div>
          </section>
        </section>
      </main>
    </div>

    <div class="modal" id="lessonModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <article class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header class="modal-header">
          <div>
            <div class="modal-meta" id="modalMeta"></div>
            <h2 id="modalTitle"></h2>
          </div>
          <div class="modal-actions">
            <a id="openPage" href="#" target="_blank" rel="noreferrer">新窗口</a>
            <button type="button" data-close-modal>关闭</button>
          </div>
        </header>
        <div class="modal-body" id="modalBody"></div>
      </article>
    </div>

    <div class="coaching-visual-modal" id="coachingVisualModal" aria-hidden="true">
      <button class="coaching-visual-backdrop" type="button" data-close-coaching-visual aria-label="关闭图片预览"></button>
      <figure class="coaching-visual-dialog" role="dialog" aria-modal="true" aria-labelledby="coachingVisualTitle">
        <figcaption><strong id="coachingVisualTitle"></strong><button type="button" data-close-coaching-visual aria-label="关闭图片预览">×</button></figcaption>
        <img id="coachingVisualImage" alt="" />
      </figure>
    </div>

    <script src="app.js?v=training-lab-6"></script>
  </body>
</html>
